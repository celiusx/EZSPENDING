services:
  - type: web
    name: ezspending-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ezspending-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false   # fill in after frontend deploys

  - type: web
    name: ezspending-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # fill in after backend deploys

databases:
  - name: ezspending-db
    plan: free
